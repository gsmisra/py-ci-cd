name: CI/CD (Docker FastAPI)

on:
  workflow_dispatch:
  push:
    branches: ["master"]

jobs:
  build_deploy_test:
    runs-on: ["cicd-runner"]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set image/container names
        shell: bash
        run: |
          # lower-case repo name for GHCR
          REPO_LC="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE=ghcr.io/${REPO_LC}:sha-${GITHUB_SHA}" >> $GITHUB_ENV
          echo "IMAGE_LATEST=ghcr.io/${REPO_LC}:latest" >> $GITHUB_ENV
          echo "CONTAINER=py-ci-cd-${GITHUB_RUN_ID}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}
            ${{ env.IMAGE_LATEST }}

      - name: Deploy (run container)
        shell: bash
        run: |
          docker rm -f "${CONTAINER}" 2>/dev/null || true
          # Map container port 8000 -> host port 8000
          docker run -d --name "${CONTAINER}" -p 8000:8000 "${IMAGE}"

      - name: Smoke test /hello
        shell: bash
        run: |
          set -e

          # Wait up to ~30s for the app to come up
          for i in {1..30}; do
            if curl -fsS "http://localhost:8000/hello" | grep -Fxq "Hello from Python-Docker"; then
              echo "Endpoint working as expected"
              exit 0
            fi
            sleep 1
          done

          echo "Smoke test failed"
          echo "Response was:"
          curl -v "http://localhost:8000/hello" || true
          echo "Container logs:"
          docker logs "${CONTAINER}" || true
          exit 1

      - name: Cleanup container
        if: always()
        shell: bash
        run: |
          docker rm -f "${CONTAINER}" || true
